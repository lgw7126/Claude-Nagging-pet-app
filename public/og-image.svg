<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#fce7f3"/>
      <stop offset="100%" stop-color="#f0abfc"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#f472b6"/>
      <stop offset="100%" stop-color="#c026d3"/>
    </linearGradient>
  </defs>

  <!-- 배경 -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- 장식 원 -->
  <circle cx="1100" cy="80" r="160" fill="#f9a8d4" opacity="0.3"/>
  <circle cx="100" cy="560" r="120" fill="#e879f9" opacity="0.2"/>

  <!-- 카드 -->
  <rect x="80" y="80" width="660" height="470" rx="40" fill="url(#card)"/>

  <!-- 카드 내부 흰 패널 -->
  <rect x="80" y="260" width="660" height="290" rx="0" fill="white" opacity="0.15"/>
  <rect x="80" y="280" width="660" height="270" rx="0" fill="white" opacity="0.1"/>
  <rect x="80" y="480" width="660" height="70" rx="40" fill="white" opacity="0.2"/>

  <!-- 앱 이름 -->
  <text x="140" y="200" font-family="Arial, sans-serif" font-size="80" font-weight="900" fill="white">잔소리펫</text>
  <text x="140" y="260" font-family="Arial, sans-serif" font-size="36" fill="rgba(255,255,255,0.85)">반려동물 케어 알리미</text>

  <!-- 루틴 예시 항목들 -->
  <rect x="120" y="300" width="580" height="60" rx="16" fill="white" opacity="0.25"/>
  <text x="160" y="340" font-family="Arial, sans-serif" font-size="28" fill="white">✅  초코  심장사상충  D-5</text>

  <rect x="120" y="375" width="580" height="60" rx="16" fill="white" opacity="0.25"/>
  <text x="160" y="415" font-family="Arial, sans-serif" font-size="28" fill="white">🚨  망고  구충제  D+2</text>

  <rect x="120" y="450" width="580" height="60" rx="16" fill="white" opacity="0.25"/>
  <text x="160" y="490" font-family="Arial, sans-serif" font-size="28" fill="white">⚠️  초코  광견병  D-3</text>

  <!-- 오른쪽 설명 텍스트 -->
  <text x="800" y="200" font-family="Arial, sans-serif" font-size="44" font-weight="700" fill="#9d174d">케어 주기를</text>
  <text x="800" y="258" font-family="Arial, sans-serif" font-size="44" font-weight="700" fill="#9d174d">반려동물이</text>
  <text x="800" y="316" font-family="Arial, sans-serif" font-size="44" font-weight="700" fill="#9d174d">직접 잔소리!</text>

  <text x="800" y="400" font-family="Arial, sans-serif" font-size="30" fill="#be185d">• 투약일 D-Day 자동 계산</text>
  <text x="800" y="445" font-family="Arial, sans-serif" font-size="30" fill="#be185d">• 가족과 URL 공유</text>
  <text x="800" y="490" font-family="Arial, sans-serif" font-size="30" fill="#be185d">• 브라우저 알림 지원</text>
</svg>
